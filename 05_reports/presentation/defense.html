<h2 id="motivation">Motivation</h2>
<ul>
<li><strong>News moves markets.</strong> Media sentiment forecasts trading <em>activity</em>, not only prices (Tetlock, 2007).</li>
<li>But most empirical work operates at <strong>daily</strong> resolution, averaging away the intraday window where information actually propagates.</li>
<li><strong>WTI crude oil</strong> is an ideal setting: a rich, well-dated event structure (OPEC, geopolitics, the weekly EIA inventory cycle, macro) on top of a deeply liquid market.</li>
</ul>
<br />
<blockquote>
<p>How does news propagate into WTI liquidity at <strong>hourly</strong> resolution? Can we somehow measure the impact? What hits harder the oil liquidity dynamics?</p>
</blockquote>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>

<h2 id="liquidity-our-ground-truth">Liquidity: our ground truth</h2>
<p>Every liquidity target is computed <strong>deterministically</strong> from the hourly WTI OHLCV bar (yfinance). These are objective measurements, not model outputs.</p>
<table>
<thead>
<tr>
<th>Variable</th>
<th>Formula</th>
<th>What it captures</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>log_volume</code></td>
<td><code>ln(volume)</code></td>
<td>trading <strong>activity</strong> per hour (primary target)</td>
</tr>
<tr>
<td><code>amihud</code></td>
<td><code>abs(log_return) / volume</code></td>
<td><strong>price impact</strong> per unit traded (Amihud 2002)</td>
</tr>
<tr>
<td><code>price_range</code></td>
<td><code>ln(high) − ln(low)</code></td>
<td>intraday <strong>volatility</strong> (Parkinson range)</td>
</tr>
<tr>
<td><code>log_return</code></td>
<td><code>ln(close_t / close_{t−1})</code></td>
<td>hourly return (used to calculate <code>amihud</code>)</td>
</tr>
</tbody>
</table>
<p><span class="small"><code>log_volume</code>, <code>amihud</code>, and <code>price_range</code> are the three targets the TFT predicts jointly. <code>amihud</code> is undefined for zero-volume hours, which are dropped when it is the target.</span></p>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>
</section>

<h2 id="phase-1-method">Phase 1: Method</h2>
<ul>
<li><strong>FinBERT</strong> (domain-adapted transformer; Araci, 2019) scores each article: probabilities of <em>negative</em>, <em>neutral</em>, <em>positive</em> tone.</li>
<li>Articles aligned to the hourly market grid.</li>
<li><strong>Lag OLS</strong> at each horizon <code>k</code>:</li>

<h2 id="phase-1-ordinary-least-squares-ols">Phase 1: Ordinary Least Squares (OLS)</h2>
<div class="cols">
<div class="col">
<p><strong>What it is</strong></p>
<p>The classical linear regression: fit a linear relationship by minimizing squared error. Here, a <strong>lag regression</strong> of hourly <code>log_volume</code> on FinBERT sentiment probabilities, run separately at each horizon <code>k</code>.</p>
<ul>
<li><strong>Coefficients</strong> with signs, magnitudes, and <strong>p-values</strong>.</li>
<li>RQ1 reads off directly: the lag with the largest significant coefficient is the peak.</li>
<li>RQ2 reads off directly: <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>β</mi><mtext>bearish</mtext></msub></mrow><annotation encoding="application/x-tex">\beta_{\text{bearish}}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.0528em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">bearish</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span> vs <span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>β</mi><mtext>bullish</mtext></msub></mrow><annotation encoding="application/x-tex">\beta_{\text{bullish}}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.3361em;"><span style="top:-2.55em;margin-left:-0.0528em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">bullish</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.15em;"><span></span></span></span></span></span></span></span></span></span>.</li>
<li>Effect sizes in plain units (a bearish article → <strong>+41%</strong> volume at +6h).</li>
</ul>
</div>
<div class="col">
<p><strong>Why it was chosen for Phase 1</strong></p>
<ul>
<li><strong>Interpretability first:</strong> the coefficients map one-to-one onto RQ1 (lag) and RQ2 (asymmetry), a clean and defensible first answer.</li>
<li><strong>A credible baseline:</strong> transparent, well-understood assumptions; a result that survives a simple model is unlikely to be an artifact.</li>
<li><strong>Fits the type of signal:</strong> most hours carry no news; a per-article cross-section handles this event-driven data cleanly.</li>
<li><strong>Sets up Phase 2:</strong> its deliberate simplicity (one sentiment axis, one lag at a time) exposes the limits the TFT then addresses.</li>
</ul>
</div>
</div>

<h2 id="phase-1-preliminar-results">Phase 1: Preliminar results</h2>
<ul>
<li><strong>RQ1:</strong> the effect peaks at <strong>+6h</strong> (<span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><msub><mi>β</mi><mtext>neg</mtext></msub><mo>=</mo><mn>0.342</mn></mrow><annotation encoding="application/x-tex">\beta_{\text{neg}}=0.342</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.9805em;vertical-align:-0.2861em;"></span><span class="mord"><span class="mord mathnormal" style="margin-right:0.0528em;">β</span><span class="msupsub"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.1514em;"><span style="top:-2.55em;margin-left:-0.0528em;margin-right:0.05em;"><span class="pstrut" style="height:2.7em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord text mtight"><span class="mord mtight">neg</span></span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.2861em;"><span></span></span></span></span></span></span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6444em;"></span><span class="mord">0.342</span></span></span></span>, roughly <strong>41% more volume</strong> than a neutral hour), with a secondary trace at +12h. Not contemporaneous.</li>
<li><strong>RQ2:</strong> <strong>bearish &gt; bullish</strong> at the dominant lags (about 18% larger at +6h).</li>
</ul>
<div style="text-align: center; margin-top: 14px;">
<p><img src="../../04_outputs/figures/lag_coefficients.png" alt="" style="width:820px;" /></p>
</div>
<p><span class="small">The <strong>p-value</strong> is the probability of seeing a coefficient this large if news truly had no effect on volume. A small value (below 0.05) means the result is unlikely to be a chance artifact, which is why it is the standard gauge of statistical significance. The +6h and +12h peaks clear that threshold; the near-zero lags do not.</span></p>

<h2 id="phase-1-findings-and-limitations">Phase 1: Findings and limitations</h2>
<div class="cols">
<div class="col">
<p><strong>Findings</strong></p>
<ul>
<li><strong>RQ1:</strong> the news-liquidity response peaks at <strong>+6h</strong>, delayed rather than contemporaneous.</li>
<li><strong>RQ2:</strong> a robust <strong>bearish &gt; bullish</strong> asymmetry at the dominant lags.</li>
<li><strong>Headline bias:</strong> title vs full-body sentiment disagree on <strong>41.6%</strong> of articles.</li>
<li>An exploratory <strong>VAR was abandoned</strong>: the hourly news signal is too sparse for a joint time-series model.</li>
</ul>
</div>
<div class="col">
<p><strong>Limitations that motivate Phase 2</strong></p>
<ul>
<li>FinBERT gives <strong>one sentiment axis</strong> (no magnitude, event type, entities), loses different dimensional information.</li>
<li>The regex filter is <strong>lexical, not semantic</strong>, high rate of false negatives and positives.</li>
<li>The signal is <strong>sparse</strong>: about half of hours carry no news.</li>
<li>The corpus is <strong>pre-war only</strong> (ends Feb 2026).</li>
<li>The OLS has <strong>no macro controls</strong>, in a complex liquidity dynamic matters</li>
</ul>
</div>
</div>
<p><span class="small">Each limitation maps to a specific Phase 2 change: LLM extraction, a semantic filter, a TFT built for sparse inputs, corpus extension through the war, and DXY/VIX covariates.</span></p>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>
</section>

<h2 id="phase-1-headline-bias-titles-vs-full-bodies">Phase 1: Headline bias: Titles vs full bodies</h2>
<div class="cols">
<div class="col">
<ul>
<li>Same FinBERT model, two inputs: <strong>title only</strong> vs <strong>title + body</strong>.</li>
<li>They disagree on <strong>41.6%</strong> of articles (p &lt; 0.001).</li>
<li>Systematic, not noise: titles lean <strong>more bullish</strong>; reading the body shifts sentiment bearish (mean signed shift <strong>−0.09</strong>; <strong>57.6%</strong> turn more bearish).</li>
<li><strong>Implication:</strong> a title-only pipeline silently inherits this bias, so Phase 2 extracts from <strong>full bodies</strong>.</li>
</ul>
</div>

<h2 id="phase-2-the-temporal-fusion-transformer-tft">Phase 2: The Temporal Fusion Transformer (TFT)</h2>
<div class="cols">
<div class="col">
<p><strong>What it is</strong></p>
<p>An attention-based neural network for <strong>multi-horizon</strong> time-series forecasting (Lim et al., 2021), built to be accurate <em>and</em> interpretable.</p>
<p><strong>How it works</strong></p>
<ul>
<li>Encodes a <strong>48h</strong> window of news + market features, then forecasts <strong>1 / 3 / 6 / 12h</strong> jointly.</li>
<li><strong>Variable Selection Networks:</strong> a learned weight per feature (<em>which</em> inputs matter).</li>
<li><strong>Interpretable attention:</strong> a weight per past hour (<em>when</em> the signal sits).</li>
<li>Outputs <strong>quantiles</strong> (intervals), not just point estimates.</li>
</ul>
</div>
<div class="col">
<p><strong>What we expect from it</strong></p>
<ul>
<li>A forecaster of hourly liquidity driven by the decomposed news features.</li>
<li>Two diagnostics read directly off the model: <strong>feature importance</strong> and <strong>temporal attention</strong>.</li>
<li>To <strong>corroborate RQ1</strong> (the +6h lag) and probe RQ2 through an independent method, triangulating Phase 1 rather than acting as a black box.</li>
</ul>
</div>
</div>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>

<h2 id="phase-2-method">Phase 2: Method</h2>
<ul>
<li>Replace FinBERT with <strong>LLM</strong> structured extraction per article:
<ul>
<li>composite <strong>sentiment</strong> + three orthogonal channels: <strong>supply - demand - risk</strong> (mirroring Kilian's 2009 oil-shock decomposition)</li>
<li>magnitude, certainty, event type, and <strong>71 entity flags</strong></li>
</ul>
</li>
<li><strong>Why channels?</strong> A single composite sentiment score disagreed across model families (Haiku vs GPT) on the geopolitical events that move the market. The response: decompose it into three separable channels.</li>
<li>Model: <strong>Temporal Fusion Transformer</strong> (Lim et al., 2021): 3 targets × 4 horizons, interpretable via variable selection and attention.</li>
</ul>

<h2 id="phase-2-why-the-llm-filter-beats-regex">Phase 2: Why the LLM filter beats regex</h2>
<p>Both filters answer the same question for the same <strong>19,619</strong> articles: <em>does this carry substantive WTI content?</em> They agree on <strong>75.2%</strong> (Cohen's κ = 0.47). The disagreement is where the LLM wins:</p>
<table>
<thead>
<tr>
<th>Disagreement</th>
<th style="text-align:right">Count</th>
<th>What these are</th>
</tr>
</thead>
<tbody>
<tr>
<td>Regex accepts, <strong>LLM rejects</strong></td>
<td style="text-align:right"><strong>3,366</strong></td>
<td>long, keyword-matched, off-topic (palm oil, canola, equity wraps)</td>
</tr>
<tr>
<td>Regex rejects, <strong>LLM accepts</strong></td>
<td style="text-align:right"><strong>1,491</strong></td>
<td>short but on-topic briefs (e.g. a 320-char OPEC+ note)</td>
</tr>
</tbody>
</table>
<ul>
<li>Regex is <strong>blind to topic</strong>: it passes long articles that merely match a keyword (false positives).</li>
<li>Its 400-character cutoff is <strong>blunt</strong>: it drops short but relevant briefs (false negatives).</li>
<li>The LLM <strong>reads the body</strong>, so it is correct on both axes. A manual audit confirms its call in the large majority.</li>
</ul>
<p><span class="small">Not an oracle: a few residual LLM errors remain (e.g. an EV-tariff article marked usable). Still, it is more accurate than regex on both of the regex's failure modes, so the LLM <code>usable</code> flag becomes the canonical Phase 2 filter.</span></p>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>

<h2 id="inter-model-calibration-why-decompose">Inter-model calibration: why decompose</h2>
<p>Same 30 stratified articles scored independently by two LLMs from different families (<strong>Haiku</strong> and a <strong>GPT reference</strong>). Cross-family disagreement flags genuine ambiguity.</p>
<div class="cols">
<div class="col">
<p><strong>The problem (composite only)</strong></p>
<p>A single sentiment number conflated <em>event valence</em> with <em>price direction</em>, so the two models read <strong>opposite signs</strong> on the high-magnitude geopolitical events that move the market.</p>
</div>
<div class="col">
<table>
<thead>
<tr>
<th>Metric</th>
<th style="text-align:right">Composite</th>
<th style="text-align:right">+ Channels</th>
</tr>
</thead>
<tbody>
<tr>
<td>Sentiment correlation</td>
<td style="text-align:right">0.39</td>
<td style="text-align:right"><strong>0.88</strong></td>
</tr>
<tr>
<td>Sign disagreement</td>
<td style="text-align:right">31%</td>
<td style="text-align:right"><strong>7%</strong></td>
</tr>
<tr>
<td>Supply channel</td>
<td style="text-align:right">n/a</td>
<td style="text-align:right">0.94</td>
</tr>
<tr>
<td>Demand channel</td>
<td style="text-align:right">n/a</td>
<td style="text-align:right">0.96</td>
</tr>
<tr>
<td>Risk channel</td>
<td style="text-align:right">n/a</td>
<td style="text-align:right">0.82</td>
</tr>
</tbody>
</table>
</div>
</div>
<p>Decomposing into supply / demand / risk <strong>disciplined the composite</strong> (0.39 → 0.88) and yielded channels two independent models agree on.</p>
<footer>News-Driven Liquidity Dynamics in WTI Crude Oil Futures: A Channel-Decomposition Approach</footer>

<h2 id="from-headline-to-features">From headline to features</h2>
<p>One of FinBERT's limitation was that news had a lot of features that change how impactful news can be, and condensing that feature set into a single number lost key information.</p>
<div class="flow" style="align-items: center;">
<div class="box">
<p><span class="small">GDELT article · thehindubusinessline.com · 2 Mar 2026</span></p>
<p><strong>&quot;Crude oil could top $100 as Strait of Hormuz closure halts flows&quot;</strong></p>
<p><span class="small">&quot;...Iran warned shipping away from the strait and insurers withdrew coverage, effectively halting tanker movements.&quot;</span></p>
</div>
<div class="arrow">→</div>
<div class="col">
<p><span class="small"><strong>LLM</strong> structured judgment</span></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;usable&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-literal"><span class="hljs-keyword">true</span></span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;sentiment_score&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.95</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;supply_impact&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">-1.0</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;demand_impact&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.0</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;risk_premium&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">1.0</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;magnitude&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">1.0</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;certainty&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-number">0.9</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;event_type&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;geopolitical&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;supply&quot;</span><span class="hljs-punctuation">]</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;time_horizon&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;immediate&quot;</span><span class="hljs-punctuation">,</span>
  <span class="hljs-attr">&quot;entities&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">[</span><span class="hljs-string">&quot;United States&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Israel&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Iran&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Wood Mackenzie&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-string">&quot;Strait of Hormuz&quot;</span><span class="hljs-punctuation">]</span>
<span class="hljs-punctuation">}</span>
</code></pre>
</div>
</div>
<p>A supply threat reads as <strong>bullish for price</strong> (<code>sentiment_score +0.95</code>), while the channels record <em>why</em>: <code>supply_impact −1.0</code>, <code>risk_premium +1.0</code>. A single tone score could not separate these.</p>

<h2 id="rq2-more-precisely">RQ2, more precisely</h2>
<ul>
<li>The TFT shows <strong>no</strong> bearish-vs-bullish gap in predicted volume (<strong>0 of 16</strong> tests significant).</li>
<li>Not a failed replication: the two phases estimate <strong>different quantities</strong>.
<ul>
<li>OLS: a <em>marginal coefficient</em> (sensitivity, holding other terms fixed).</li>
<li>TFT: a <em>group-mean</em> difference (unconditional).</li>
</ul>
</li>
<li><strong>Tone vs price:</strong> FinBERT (tone) and Haiku (price) flip sign on geopolitical news. A supply threat is bearish in <em>tone</em> but bullish for <em>price</em>.</li>
</ul>
<blockquote>
<p>For the TFT it is not a matter of negative versus positive news, but of the <strong>risk premium</strong> the news implies.</p>
</blockquote>

<h2 id="key-findings">Key findings</h2>
<ul>
<li><strong>RQ1:</strong> news propagates into WTI liquidity over a <strong>+6 to +12 hour</strong> window, recovered independently by a linear baseline and a deep-learning forecaster.</li>
<li><strong>RQ2:</strong> a robust <strong>bearish &gt; bullish</strong> asymmetry in <em>marginal sensitivity</em> (Phase 1); at the level of predicted volume the model organizes around <strong>risk and salience over direction</strong> (Phase 2).</li>
<li>Supporting findings: the <strong>channel decomposition</strong>, the <strong>LLM-as-filter</strong>, and the <strong>41.6% headline bias</strong>.</li>
</ul>

<h2 id="limitations">Limitations</h2>
<ul>
<li><strong>Regime extrapolation:</strong> <code>price_range</code> fails on the unseen war regime (trained pre-war only). A clean illustration of a model bound by its training window.</li>
<li><strong>Single commodity:</strong> confined to WTI; the risk-and-salience reading may be specific to its geopolitical supply structure.</li>
<li><strong>Corpus composition:</strong> GDELT skews to retail-facing web and print, not institutional feeds.</li>
<li><strong>Validation:</strong> LLM features are checked by cross-model agreement, not human ground truth.</li>
</ul>

<h2 id="conclusion">Conclusion</h2>
<p>Three contributions:</p>
<ul>
<li><strong>(a)</strong> An empirical lag-and-asymmetry characterization for WTI at <strong>hourly</strong> resolution.</li>
<li><strong>(b)</strong> A <strong>channel decomposition</strong> of LLM-extracted news features, validated by cross-model agreement.</li>
<li><strong>(c)</strong> A quantified <strong>title-vs-body headline bias</strong> (41.6%).</li>
</ul>
<p>Underlying all three: a reusable <strong>two-phase template</strong>, an interpretable baseline plus an expressive model, with neither discarded.</p>
